<!DOCTYPE html>
 <html lang="zh-CN">
 <head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>母亲节快乐</title>
     <style>
         body {
             background: #fff5f8;
             font-family: "Microsoft YaHei", sans-serif;
             margin: 0;
             padding: 20px;
         }
         .card {
             background: #fff;
             max-width: 360px;
             margin: 0 auto;
             padding: 30px;
             border-radius: 20px;
             box-shadow: 0 4px 12px rgba(255,153,170,0.2);
         }
         .heart {
             color: #ff6b81;
             font-size: 40px;
             text-align: center;
         }
         h1 {
             text-align: center;
             color: #333;
             margin: 20px 0;
         }
         .text {
             color: #555;
             line-height: 1.8;
         }
         .footer {
             text-align: center;
             color: #ff6b81;
             margin-top: 20px;
         }
     </style>
 </head>
 <body>
     <div class="card">
         <div class="heart">💌</div>
         <h1>老妈，母亲节快乐！</h1>
         <div class="text">
             这么多年你为家里操劳奔波，事事都为我牵挂操心。<br><br>
             以前年少不懂事，总惹你生气、让你操心劳累，任性又叛逆，让你受了很多委屈。<br><br>
             慢慢长大才彻底明白，你所有的唠叨和碎碎念，全都是藏不住的疼爱。<br><br>
             往后我会好好懂事，少让你烦心，多体谅你的辛苦。<br><br>
             不求大富大贵，只愿我的妈妈，身体健康，平安无忧，少点辛苦，多点快乐，轻松自在过好每一天。
         </div>
         <div class="footer">
             辛苦你这么多年啦，我一直都很爱你 ❤️
         </div>
     </div>
 </body>
 </html>
